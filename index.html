<!DOCTYPE html>
<html>
<head>
  <title>BaseLense</title>
  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b0b0f;
      color:white;
      text-align:center;
    }

    .logo {
      font-size:40px;
      font-weight:bold;
      margin-top:100px;
      background:linear-gradient(90deg,#ff0080,#7928ca);
      -webkit-background-clip:text;
      color:transparent;
    }

    button {
      padding:15px 25px;
      border:none;
      border-radius:10px;
      margin-top:30px;
      font-size:16px;
      background:linear-gradient(90deg,#ff0080,#7928ca);
      color:white;
      cursor:pointer;
      box-shadow:0 0 15px rgba(255,0,128,0.6);
    }
  </style>
</head>

<body>

<div class="logo">BaseLense</div>

<h2>Explore Base Like a Pro 🚀</h2>

<button onclick="go()">Enter App</button>

<script>
function go(){
  window.location.href="app.html";
}
</script>

</body>
</html>
