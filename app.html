<!DOCTYPE html>
<html>
<head>
<title>BaseLense Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  color:white;
  background: linear-gradient(-45deg, #ff0080, #7928ca, #1c92d2, #00c6ff);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.hero{
  text-align:center;
  padding:40px 20px;
}

.hero input{
  width:55%;
  padding:16px;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:15px;
  background: rgba(255,255,255,0.1);
  color:white;
  backdrop-filter: blur(10px);
}

.hero button{
  padding:14px 24px;
  border:none;
  border-radius:12px;
  margin-top:12px;
  background: linear-gradient(90deg,#ff0080,#7928ca);
  color:white;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,0,128,0.6);
}

.section{
  padding:30px 40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding:20px;
  border-radius:16px;
  text-align:center;
  transition: all 0.3s ease;
}

.card:hover{
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 0 25px rgba(255,0,128,0.4);
}

.big{
  font-size:22px;
  margin-top:10px;
}

canvas{
  background: rgba(0,0,0,0.3);
  border-radius:12px;
  padding:10px;
}

h2{
  font-size:22px;
  margin-bottom:15px;
  background: linear-gradient(90deg,#ff0080,#00c6ff);
  -webkit-background-clip: text;
  color: transparent;
}

.result-box{
  margin-top:30px;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">BaseLense</div>
  <select>
    <option>Base</option>
  </select>
</div>

<div class="hero">
  <h1>Base Chain Analytics</h1>
  <p style="opacity:0.7">Track wallets • Analyze activity • Discover Base trends</p>

  <input id="wallet" placeholder="Enter wallet address">
  <br>
  <button onclick="analyze()">Analyze Wallet</button>

  <div class="grid result-box" id="results"></div>
</div>

<div class="section">
  <h2>Network Overview</h2>

  <div class="grid">
    <div class="card">
      Total Txns
      <div class="big" id="txns">Loading...</div>
    </div>

    <div class="card">
      Active Users
      <div class="big">~1.2M</div>
    </div>

    <div class="card">
      New Users
      <div class="big">~75K/day</div>
    </div>

    <div class="card">
      Latest Block
      <div class="big" id="block">Loading...</div>
    </div>
  </div>
</div>

<div class="section">
  <h2>Network Activity</h2>
  <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js"></script>

<script>
async function loadNetwork(){
  const provider = new ethers.JsonRpcProvider("https://mainnet.base.org");
  const block = await provider.getBlockNumber();
  document.getElementById("block").innerText = block;
  document.getElementById("txns").innerText = (block * 120).toLocaleString();
}

loadNetwork();

new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    datasets: [{
      label: "Tx Activity",
      data: [12000,25000,18000,40000,35000,50000,62000]
    }]
  }
});

async function analyze(){
  const wallet = document.getElementById("wallet").value;
  if(!wallet) return alert("Enter wallet");

  const provider = new ethers.JsonRpcProvider("https://mainnet.base.org");

  const balance = await provider.getBalance(wallet);
  const tx = await provider.getTransactionCount(wallet);

  const eth = (Number(balance)/1e18).toFixed(4);

  let score="Low";
  let tag="New";

  if(tx>100){score="Medium";tag="Active";}
  if(tx>500){score="High";tag="Pro";}
  if(tx>1000){tag="Whale";}

  document.getElementById("results").innerHTML = `
    <div class="card">Balance<div class="big">${eth} ETH</div></div>
    <div class="card">Transactions<div class="big">${tx}</div></div>
    <div class="card">Score<div class="big">${score}</div></div>
    <div class="card">Wallet Type<div class="big">${tag}</div></div>
  `;
}
</script>

</body>
</html>
