<!DOCTYPE html>
<html>
<head>
<title>BaseLense Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family: 'Segoe UI';
  color:white;

  /* 🔥 GRADIENT BACKGROUND */
  background: linear-gradient(135deg,#0f2027,#2c5364,#1c92d2);
}

.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.hero{
  text-align:center;
  padding:40px 20px;
}

.hero input{
  width:50%;
  padding:15px;
  border-radius:10px;
  border:none;
}

.hero button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  background:#4da3ff;
  color:white;
  cursor:pointer;
}

.section{
  padding:30px 40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.big{
  font-size:22px;
  margin-top:10px;
}

canvas{
  background: rgba(0,0,0,0.3);
  border-radius:12px;
  padding:10px;
}

/* 🔥 RESULT SECTION TOP PAR */
.result-box{
  margin-top:30px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">BaseLense</div>

  <select>
    <option>Base 🔵</option>
  </select>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Base Chain Analytics</h1>
  <input id="wallet" placeholder="Enter wallet address">
  <br>
  <button onclick="analyze()">Analyze Wallet</button>

  <!-- 🔥 RESULT AB YAHAN SHOW HOGA -->
  <div class="grid result-box" id="results"></div>
</div>

<!-- NETWORK -->
<div class="section">
  <h2>Network Overview</h2>

  <div class="grid">
    <div class="card">
      Total Txns
      <div class="big" id="txns">Loading...</div>
    </div>

    <div class="card">
      Active Users
      <div class="big">~1.2M</div>
    </div>

    <div class="card">
      New Users
      <div class="big">~75K/day</div>
    </div>

    <div class="card">
      Latest Block
      <div class="big" id="block">Loading...</div>
    </div>
  </div>
</div>

<!-- CHART -->
<div class="section">
  <h2>Network Activity</h2>
  <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js"></script>

<script>

// NETWORK LOAD
async function loadNetwork(){
  const provider = new ethers.JsonRpcProvider("https://mainnet.base.org");

  const block = await provider.getBlockNumber();
  document.getElementById("block").innerText = block;

  document.getElementById("txns").innerText = (block * 120).toLocaleString();
}
loadNetwork();

// CHART
new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    datasets: [{
      label: "Tx Activity",
      data: [12000,25000,18000,40000,35000,50000,62000]
    }]
  }
});

// ANALYZE
async function analyze(){

  const wallet = document.getElementById("wallet").value;
  if(!wallet) return alert("Enter wallet");

  const provider = new ethers.JsonRpcProvider("https://mainnet.base.org");

  const balance = await provider.getBalance(wallet);
  const tx = await provider.getTransactionCount(wallet);

  const eth = (Number(balance)/1e18).toFixed(4);

  let score="Low ⚠️";
  let tag="New";

  if(tx>100){score="Medium 👀";tag="Active";}
  if(tx>500){score="High 🔥";tag="Pro";}
  if(tx>1000){tag="Whale 🐋";}

  document.getElementById("results").innerHTML = `
    <div class="card">Balance<div class="big">${eth} ETH</div></div>
    <div class="card">Transactions<div class="big">${tx}</div></div>
    <div class="card">Score<div class="big">${score}</div></div>
    <div class="card">Wallet Type<div class="big">${tag}</div></div>
  `;
}

</script>

</body>
</html>
